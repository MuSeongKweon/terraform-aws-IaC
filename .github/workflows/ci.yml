name: Terraform CI

on:
  push:
    branches:
      - main
      - dev
      - feature/*

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Terraform 설치
        uses: hashicorp/setup-terraform@v2

      - name: Terraform version 확인
        run: terraform version

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate
